apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "yba-kubernetes-controller.fullname" . }}-test-connection"
  labels:
    {{- include "yba-kubernetes-controller.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "yba-kubernetes-controller.fullname" . }}:{{ .Values.deployment.containerPort }}']
  restartPolicy: Never
